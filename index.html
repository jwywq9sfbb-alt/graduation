<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢聯會服務站</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        header { background: #2c3e50; color: white; padding: 2.5rem 1rem; text-align: center; position: relative; }
        .admin-login { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        nav { display: flex; justify-content: center; background: #34495e; padding: 10px; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { width: 90%; max-width: 1000px; margin: 20px auto; }
        
        /* 照片牆 */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .photo-item { width: 100%; height: 180px; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* QA 區 */
        .qa-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 100px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; resize: none; box-sizing: border-box; margin-bottom: 10px; }
        .post-btn { background: #3498db; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .qa-item { border-bottom: 1px solid #eee; padding: 20px 0; }
        .answer { background: #f0f9ff; padding: 15px; border-left: 4px solid #27ae60; margin-top: 10px; border-radius: 4px; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        
        #adminArea { display: none; background: #fff3e0; padding: 20px; border-radius: 12px; border: 2px dashed #e67e22; margin-bottom: 30px; }
    </style>
</head>
<body>

<header>
    <div class="admin-login" id="loginLabel" onclick="loginAdmin()">管理員登入</div>
    <h1>🎓 畢聯會服務站</h1>
    <p>回憶紀錄 ‧ 匿名提問</p>
</header>

<nav><a href="#photos">照片牆</a><a href="#qa">提問專區</a></nav>

<div class="container">
    <section id="photos">
        <h2 style="border-left: 5px solid #e67e22; padding-left: 15px;">📸 精彩紀錄</h2>
        <div class="gallery-grid" id="galleryGrid">
            </div>
    </section>

    <section id="qa" style="margin-top: 50px;">
        <h2 style="border-left: 5px solid #3498db; padding-left: 15px;">💬 匿名提議區</h2>
        <div id="adminArea">
            <h3>🔒 管理模式：待審核內容</h3>
            <div id="pendingList">載入中...</div>
            <button onclick="location.reload()" style="margin-top:10px;">登出系統</button>
        </div>
        <div class="qa-container">
            <textarea id="qInput" placeholder="留言後請靜候管理員審核回覆..."></textarea>
            <button class="post-btn" onclick="postQ()">送出提議</button>
            <h3 style="margin-top:30px;">💡 已刊登回覆</h3>
            <div id="publicList">載入中...</div>
        </div>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // 你的 Firebase 配置 (僅用於留言板)
    const firebaseConfig = {
        apiKey: "AIzaSyAPh-eTbUvGLFKFvTByfnGLJwja2bH4iKQ",
        authDomain: "graduation-cdb95.firebaseapp.com",
        databaseURL: "https://graduation-cdb95-default-rtdb.firebaseio.com",
        projectId: "graduation-cdb95"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const PASS = "114gsa 0609";
    let isAdmin = false;

    // --- 照片功能：手動載入你 GitHub photos 資料夾的照片 ---
    // 請確保你在 GitHub 的 photos 資料夾裡有 1.jpg, 2.jpg, 3.jpg, 4.jpg
    const myPhotos = [
        "photos/1.jpg",
        "photos/2.jpg",
        "photos/3.jpg",
        "photos/4.jpg"
    ];

    function renderPhotos() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = myPhotos.map(url => `
            <div class="photo-item">
                <img src="${url}" onerror="this.src='https://via.placeholder.com/180?text=Loading+Fail'">
            </div>
        `).join('');
    }
    renderPhotos();

    // --- QA 功能 ---
    db.ref('qa_list').on('value', (snap) => {
        const data = snap.val();
        const publicList = document.getElementById('publicList');
        const pendingList = document.getElementById('pendingList');
        if (!data) { publicList.innerHTML = "目前尚無回覆。"; pendingList.innerHTML = "無留言。"; return; }

        const items = Object.values(data).reverse();
        publicList.innerHTML = items.filter(i => i.answer !== "").map(i => `
            <div class="qa-item">
                <div class="question">Q: ${i.question}</div>
                <div class="answer"><strong>💡 畢聯會回覆：</strong>${i.answer}</div>
                ${isAdmin ? `<button class="del-btn" onclick="deleteQA('${i.id}')">刪除此則</button>` : ''}
            </div>
        `).join('') || "目前尚無刊登。";

        if (isAdmin) {
            pendingList.innerHTML = items.filter(i => i.answer === "").map(i => `
                <div class="qa-item">
                    <div>${i.question}</div>
                    <button style="background:#27ae60; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;" onclick="replyQA('${i.id}')">回覆</button>
                    <button class="del-btn" style="margin-top:0" onclick="deleteQA('${i.id}')">直接刪除</button>
                </div>
            `).join('') || "沒有待處理留言。";
        }
    });

    function loginAdmin() {
        if(prompt("請輸入管理員密碼：") === PASS) {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            document.getElementById('loginLabel').innerText = "✅ 管理模式";
            renderPhotos();
            alert("登入成功！");
        }
    }

    function postQ() {
        const el = document.getElementById('qInput');
        if (!el.value.trim()) return;
        const ref = db.ref('qa_list').push();
        ref.set({ id: ref.key, question: el.value, answer: "" });
        el.value = "";
        alert("提問已送出，請靜候審核！");
    }

    function replyQA(id) {
        const ans = prompt("請輸入回覆內容：");
        if (ans) db.ref('qa_list/' + id).update({ answer: ans });
    }

    function deleteQA(id) {
        if (confirm("刪除此提問？")) db.ref('qa_list/' + id).remove();
    }
</script>
</body>
</html>
